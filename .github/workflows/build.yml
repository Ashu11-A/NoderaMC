# Build & test on push/PR. JDK: host provides JDK 25 in this environment; CI uses Temurin 21
# once the Task 0 pin is restored.
name: build
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew check build --stacktrace
