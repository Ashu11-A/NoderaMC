# Build & test on push/PR. JDK: host provides JDK 25 in this environment; CI uses Temurin 21
# once the Task 0 pin is restored.
#
# Two toolchains, one gate (Task 27, legacy spec docs/old/Task.27.md): the `java` job and the `rust` job are both
# required. A red cargo job blocks merge exactly like a red `./gradlew check` — the Rust services
# speak the same frozen wire contract, so a codec regression is a consensus regression.
name: build
on:
  push:
  pull_request:

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew check build --stacktrace
      # The golden wire fixtures are committed; `:transport:test` fails if the encoder drifts from
      # them. Fail loudly if the run mutated a fixture (that can only happen with the deliberate
      # -Dnodera.fixtures.regenerate flag, which must never be set in CI).
      - name: Golden fixtures unchanged
        run: git diff --exit-code -- fixtures/

  # L-47's exit job: build the companion app, prove the gate both ways, and prove a hosted
  # world survives the host closing Minecraft (the worker keeps it alive).
  companion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust
            rust/nodera-app
      - name: Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev
      - name: Build service binaries + worker dist
        run: |
          (cd rust && cargo build --release --bin nodera-tracker --bin nodera-rendezvous)
          ./gradlew :peer:installDist
          mkdir -p build
          cp -r java/peer/build/install/nodera-headless build/
      - name: Build the companion app
        run: cd rust/nodera-app && cargo build --release
      - name: Gate both ways (worker present => start, absent => actionable abort)
        run: ./gradlew :neoforge-mod:test --tests 'dev.nodera.mod.common.CompanionGateTest'
      - name: Hosted world survives the host closing Minecraft
        run: ./gradlew :peer:test --tests 'dev.nodera.headless.WorldContinuityIT' --tests 'dev.nodera.headless.CompanionCrashSurvivalIT'

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml pins the channel; rustup honours it automatically.
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      # Includes the cross-language conformance tests: the tag-registry mirror is asserted against
      # the Java sources, and every `fixtures/wire/*.bin` is decoded + re-encoded byte-exactly.
      - run: cargo test

  release-artifacts:
    # Service binaries are published per tag: operators run `nodera-tracker` / `nodera-rendezvous`
    # as standalone infrastructure, so they need built artifacts, not a source checkout.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [java, rust]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - run: cargo build --release --bin nodera-tracker --bin nodera-rendezvous
      - uses: actions/upload-artifact@v4
        with:
          name: nodera-services-${{ github.ref_name }}
          path: |
            rust/target/release/nodera-tracker
            rust/target/release/nodera-rendezvous
          if-no-files-found: error
