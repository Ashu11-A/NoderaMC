# NeoForge mod descriptor for NoderaMC
modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"

[[mods]]
modId = "${modId}"
version = "${modVersion}"
displayName = "${modName}"
description = "${modDescription}"
authors = ["NoderaMC Team"]

[[mixins]]
config = "${modId}.mixins.json"

[[dependencies.${modId}]]
modId = "neoforge"
type = "required"
versionRange = "[21.0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${modId}]]
modId = "minecraft"
type = "required"
versionRange = "[1.21,)"
ordering = "NONE"
side = "BOTH"
